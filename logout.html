<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logout - Aurora House</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <section class="auth-section">
        <div class="auth-card" style="text-align: center;">
            <div class="success-icon" style="font-size: 3rem; color: var(--success-color); margin-bottom: 1rem;">✓</div>
            <h1>You have been logged out</h1>
            <p class="auth-subtitle">Thank you for visiting Aurora House. Redirecting to the home page…</p>
            <a href="index.html" class="btn btn-primary" style="margin-top: 1rem;">Go to Home</a>
        </div>
    </section>
    <script src="auth.js"></script>
    <script>
        AuroraData.logoutUser();
        setTimeout(() => { window.location.href = 'index.html'; }, 2000);
    </script>
</body>
</html>
